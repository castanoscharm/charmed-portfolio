<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .banner {
    width: 1584px;
    height: 396px;
    background: linear-gradient(180deg, #080101 0%, #0d0202 25%, #110202 50%, #0d0202 75%, #080101 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 100px;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  /* Subtle radial glow */
  .banner::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 30%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(201,144,138,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .banner::after {
    content: '';
    position: absolute;
    top: 50%;
    right: 10%;
    transform: translateY(-50%);
    width: 500px;
    height: 250px;
    background: radial-gradient(ellipse, rgba(201,144,138,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Stars/sparkles */
  .sparkle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(239,239,239,0.08);
    border-radius: 50%;
  }
  .sparkle.bright {
    width: 3px;
    height: 3px;
    background: rgba(239,239,239,0.12);
    box-shadow: 0 0 4px rgba(239,239,239,0.06);
  }
  .sparkle.cross::before,
  .sparkle.cross::after {
    content: '';
    position: absolute;
    background: rgba(239,239,239,0.06);
  }
  .sparkle.cross::before {
    width: 10px; height: 1px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .sparkle.cross::after {
    width: 1px; height: 10px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .left {
    position: relative;
    z-index: 1;
  }
  .est {
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(239,239,239,0.4);
    margin-bottom: 8px;
  }
  .studio-name {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 48px;
    font-weight: normal;
    color: #efefef;
    letter-spacing: 1px;
    line-height: 1.2;
  }
  .studio-name .charmed {
    font-style: normal;
    font-weight: bold;
  }
  .studio-name .digital {
    display: block;
    font-size: 22px;
    font-style: italic;
    font-weight: normal;
    letter-spacing: 3px;
    color: rgba(239,239,239,0.6);
    margin-top: 2px;
  }

  .right {
    position: relative;
    z-index: 1;
    text-align: right;
  }
  .services {
    font-family: 'Georgia', serif;
    font-size: 16px;
    color: rgba(239,239,239,0.7);
    letter-spacing: 1.5px;
    line-height: 2.2;
  }
  .services span {
    display: block;
  }
  .dot {
    display: inline-block;
    width: 3px;
    height: 3px;
    background: rgba(201,144,138,0.5);
    border-radius: 50%;
    vertical-align: middle;
    margin: 0 12px;
  }

  /* Thin decorative line */
  .line {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, rgba(201,144,138,0.15), transparent);
  }
</style>
</head>
<body>
  <div class="banner">
    <!-- Sparkles -->
    <div class="sparkle" style="top:45px;left:220px"></div>
    <div class="sparkle bright" style="top:80px;left:520px"></div>
    <div class="sparkle" style="top:310px;left:180px"></div>
    <div class="sparkle cross" style="top:60px;left:900px"></div>
    <div class="sparkle" style="top:200px;left:750px"></div>
    <div class="sparkle bright" style="top:340px;left:1100px"></div>
    <div class="sparkle" style="top:30px;left:1300px"></div>
    <div class="sparkle cross" style="top:280px;left:1400px"></div>
    <div class="sparkle" style="top:150px;left:1200px"></div>
    <div class="sparkle" style="top:90px;left:1050px"></div>
    <div class="sparkle bright" style="top:250px;left:400px"></div>
    <div class="sparkle" style="top:350px;left:650px"></div>
    <div class="sparkle cross" style="top:160px;left:100px"></div>
    <div class="sparkle" style="top:370px;left:950px"></div>

  </div>
</body>
</html>
